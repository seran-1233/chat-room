<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat Application</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Join Screen -->
    <div id="join-screen" class="screen active">
        <div class="join-container">
            <h1>💬 Real-Time Chat</h1>
            <p class="subtitle">Enter your name to join the conversation</p>
            <form id="join-form">
                <input 
                    type="text" 
                    id="username-input" 
                    placeholder="Enter your username" 
                    maxlength="20"
                    required
                    autocomplete="off"
                />
                <button type="submit" class="btn-primary">Join Chat</button>
            </form>
            <p class="info-text">
                <span class="status-indicator offline"></span>
                Connecting to server...
            </p>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen">
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-left">
                    <h2>💬 Chat Room</h2>
                    <span class="connection-status">
                        <span class="status-indicator online"></span>
                        Connected
                    </span>
                </div>
                <div class="header-right">
                    <span id="online-count" class="online-count">0 online</span>
                </div>
            </div>

            <div class="chat-main">
                <!-- Sidebar (Online Users) -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h3>Online Users</h3>
                        <button id="toggle-sidebar" class="toggle-btn" aria-label="Toggle sidebar">
                            <span>◀</span>
                        </button>
                    </div>
                    <ul id="online-users-list" class="users-list">
                        <!-- Users will be populated here -->
                    </ul>
                </aside>

                <!-- Messages Area -->
                <div class="messages-container">
                    <div id="messages" class="messages">
                        <!-- Messages will be populated here -->
                    </div>

                    <!-- Typing Indicator -->
                    <div id="typing-indicator" class="typing-indicator hidden">
                        <span class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                        <span id="typing-text"></span>
                    </div>

                    <!-- Input Area -->
                    <div class="input-container">
                        <form id="message-form">
                            <input 
                                type="text" 
                                id="message-input" 
                                placeholder="Type your message..." 
                                maxlength="500"
                                autocomplete="off"
                                disabled
                            />
                            <button type="submit" class="btn-send" disabled>
                                <span class="send-icon">➤</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase Client for Realtime -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Main App Script -->
    <script src="js/app.js"></script>
</body>
</html>
